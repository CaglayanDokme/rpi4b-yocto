# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

BSPDIR := "${@os.path.abspath(os.path.dirname(d.getVar('FILE', True)) + '/../..')}"

# Core Layers
BBLAYERS += "${BSPDIR}/poky/meta"
BBLAYERS += "${BSPDIR}/poky/meta-poky"
BBLAYERS += "${BSPDIR}/poky/meta-yocto-bsp"

# Third-party layers
BBLAYERS += "${BSPDIR}/layers/meta-raspberrypi"
BBLAYERS += "${BSPDIR}/layers/meta-openembedded/meta-oe"
BBLAYERS += "${BSPDIR}/layers/meta-openembedded/meta-python"
BBLAYERS += "${BSPDIR}/layers/meta-openembedded/meta-networking"

# Custom layers
BBLAYERS += "${BSPDIR}/layers/meta-wifi"
