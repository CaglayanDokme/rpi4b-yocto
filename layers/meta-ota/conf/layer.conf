# meta-ota layer configuration
# Provides RAUC-based OTA update support for Raspberry Pi 4B

BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-ota"
BBFILE_PATTERN_meta-ota = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-ota = "9"

LAYERDEPENDS_meta-ota = "core rauc"
LAYERSERIES_COMPAT_meta-ota = "scarthgap"
